name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check, lint, and build
        run: npm run build

      - name: Run test suites (reducer/finance sanity checks + live BroadcastChannel simulation)
        run: npm test

      - name: Lint
        run: npm run lint
